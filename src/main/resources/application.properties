spring.application.name=demo
# =============================================
# SkillBridge Application Configuration
# =============================================


# --- Server ---
server.port=${PORT:8080}
server.servlet.context-path=/api

# --- PostgreSQL DataSource (Supabase - Session Pooler) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# --- JWT ---
app.jwt.secret=${JWT_SECRET}app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# --- OAuth2 Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}spring.security.oauth2.client.registration.google.scope=email,profile
app.oauth2.redirect-uri=https://authentication-frontend-iota.vercel.app/oauth2/callback

spring.security.oauth2.client.registration.google.redirect-uri=https://authentication-frontend-iota.vercel.app/login/oauth2/code/{registrationId}



# --- Mail ---
app.mail.from=onboarding@resend.dev
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# --- App ---
app.frontend-url=https://authentication-frontend-iota.vercel.app
app.cors.allowed-origins=https://authentication-frontend-iota.vercel.app

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.com.skillbridge=INFO
logging.level.org.springframework.security=WARN


# Scheduling
scheduler.notifications.cron=0 0 9 * * *
scheduler.rank.cron=0 0 2 * * *

# Cache TTL (seconds)
cache.recommendations.ttl=3600
cache.leaderboard.ttl=300